<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCSE Circle Area - Edexcel Foundation</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            background: linear-gradient(135deg, #d4af37 0%, #1b5e20 100%);
            font-family: 'Arial Black', sans-serif; overflow: hidden;
        }

        .timer-bar {
            flex: 0 0 auto; background: rgba(0, 0, 0, 0.9); color: white; 
            padding: 10px 30px; margin: 10px auto; border-radius: 50px; 
            display: flex; align-items: center; gap: 15px;
        }
        #timer-display { font-size: 2.5rem; font-family: monospace; min-width: 120px; text-align: center; color: #f1c40f; }
        .timer-btn { background: #d4af37; border: none; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: bold; }

        .container {
            flex: 1; width: 96vw; margin: 0 auto 10px auto;
            background-color: #fafaf8; border-radius: 20px;
            display: grid; grid-template-columns: 1.2fr 0.8fr; overflow: hidden;
        }

        .problem-section { padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; background: white; border-right: 2px solid #eee; }
        
        /* Circle Visual */
        .circle-visual {
            width: 180px; height: 180px; border: 5px solid #333; border-radius: 50%;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .line-radius { width: 50%; height: 4px; background: #d4af37; position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: none; }
        .line-diameter { width: 100%; height: 4px; background: #1b5e20; position: absolute; left: 0; top: 50%; transform: translateY(-50%); display: none; }
        .circle-label { position: absolute; top: 35%; font-size: 1.8rem; color: #333; }

        .level-select button { padding: 10px; font-size: 0.85rem; margin: 2px; cursor: pointer; border: none; border-radius: 8px; background: #1b5e20; color: white; font-weight: bold; }

        .input-group { font-size: 1.8rem; display: flex; align-items: center; gap: 10px; }
