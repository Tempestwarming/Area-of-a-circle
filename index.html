<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Circle Area Tool</title>
    <style>
        /* Essential Layout to fix the "disappearing" problem */
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; flex-direction: column;
            background: linear-gradient(135deg, #d4af37 0%, #1b5e20 100%);
            font-family: sans-serif; overflow: hidden;
        }

        /* Timer at the top */
        .timer-zone {
            flex: 0 0 auto; background: #000; color: #f1c40f;
            padding: 10px; text-align: center; font-size: 2rem;
            display: flex; justify-content: center; align-items: center; gap: 15px;
        }
        .timer-btn { background: #d4af37; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; border-radius: 4px; }

        /* Main Workspace */
        .main-ui {
            flex: 1; width: 95vw; margin: 10px auto;
            background: #fff; border-radius: 15px;
            display: grid; grid-template-columns: 1fr 1fr;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); overflow: hidden;
        }

        /* Left Side */
        .problem-box {
            padding: 20px; display: flex; flex-direction: column;
            align-items: center; justify-content: space-around;
            border-right: 2px solid #ddd;
        }

        .level-btns button { padding: 10px; margin: 2px; background: #1b5e20; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* The Circle Graphic */
        .circle-draw {
            width: 150px; height: 150px; border: 4px solid #333;
            border-radius: 50%; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .radius-line { width: 50%; height: 3px; background: red; position: absolute; right: 0; top: 50%; display: none; }
        .diameter-line { width: 100%; height: 3px; background: blue; position: absolute; left: 0; top: 50%; display: none; }

        input { width: 100px; font-size: 2rem; text-align: center; border: 3px solid #d4af37; border-radius: 8px; }
        .check-btn { width: 80%; padding: 15px; background: #1b5e20; color: #fff; font-size: 1.5rem; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* Right Side */
        .guide-box { padding: 20px; background: #f9f9f9; overflow-y: auto; }
        .step { background: #fff; padding: 10px; margin-bottom: 10px; border-left: 5px solid #d4af37; font-size: 1.1rem; }
        #feedback { font-size: 2rem; font-weight: bold; margin-top: 10px; text-align: center; height: 40px; }
    </style>
</head>
<body>

    <div class="timer-zone">
        <button class="timer-btn" onclick="changeTime(-30)">-30s</button>
        <span id="clock">02:00</span>
        <button class="timer-btn" onclick="changeTime(30)">+30s</button>
        <button class="timer-btn" id="run-btn" onclick="toggleClock()" style="background:#27ae60">START</button>
        <button class="timer-btn" onclick="resetClock()" style="background:#c0392b">RESET</button>
    </div>

    <div class="main-ui">
        <div class="problem-box">
            <div class="level-btns">
                <button onclick="makeProblem(1)">Level 1</button>
                <button onclick="makeProblem(2)">Level 2</button>
                <button onclick="makeProblem(3)">Level 3</button>
            </div>

            <h2 id="task-title" style="margin:0; color:#1b5e20;">Find Area (In terms of Pi)</h2>

            <div class="circle-draw">
                <div id="r-line" class="radius-line"></div>
                <div id="d-line" class="diameter-line"></div>
                <div id="circle-val" style="font-weight:bold; font-size:1.5rem; background:#fff; padding:2px; z-index:2;">?</div>
            </div>

            <div style="font-size: 1.5rem;">
                Answer: <input type="number" id="userIn"> <span id="unit-label">π</span>
            </div>

            <button class="check-btn" onclick="checkAnswer()">CHECK ANSWER</button>
            <div id="feedback"></div>
        </div>

        <div class="guide-box">
            <h3 style="color:#1b5e20; border-bottom:2px solid #d4af37;">How to Solve</h3>
            <div class="step">1. Find the <b>Radius</b> (r).</div>
            <div class="step">2. Multiply radius by itself (<b>r x r</b>).</div>
            <div class="step">3. <b>Diameter?</b> Halve it first!</div>
            <div class="step">4. <b>Radius from Area?</b> Square root it!</div>
            
            <button onclick="showHint()" style="width:100%; padding:10px; margin-top:10px; cursor:pointer;">Show Hint</button>
            <div id="hint-txt" class="step" style="display:none; background:#e8f5e9;"></div>
            
            <button onclick="showAnswer()" style="width:100%; padding:10px; margin-top:10px; cursor:pointer;">Reveal Answer</button>
            <div id="ans-txt" class="step" style="display:none; background:#fff3cd;"></div>
        </div>
    </div>

<script>
    let goal = 0, time = 120, ticker = null;

    function updateClock() {
        let m = Math.floor(time / 60), s = time % 60;
        document.getElementById('clock').innerText = m.toString().padStart(2,'0') + ":" + s.toString().padStart(2,'0');
    }

    function toggleClock() {
        let b = document.getElementById('run-btn');
        if (ticker) { clearInterval(ticker); ticker = null; b.innerText = "START"; }
        else { ticker = setInterval(() => { if (time > 0) { time--; updateClock(); } }, 1000); b.innerText = "PAUSE"; }
    }

    function changeTime(n) { time = Math.max(0, time + n); updateClock(); }
    function resetClock() { clearInterval(ticker); ticker = null; time = 120; updateClock(); document.getElementById('run-btn').innerText = "START"; }

    function makeProblem(lv) {
        document.getElementById('feedback').innerText = "";
        document.getElementById('hint-txt').style.display = "none";
        document.getElementById('ans-txt').style.display = "none";
        document.getElementById('userIn').value = "";
        
        let r = Math.floor(Math.random() * 9) + 2;
        let rSq = r * r;

        document.getElementById('r-line').style.display = "none";
        document.getElementById('d-line').style.display = "none";
        document.getElementById('unit-label').innerText = "π";

        if (lv === 1) {
            document.getElementById('task-title').innerText = "Find Area (In terms of Pi)";
            document.getElementById('r-line').style.display = "block";
            document.getElementById('circle-val').innerText = "r=" + r;
            goal = rSq;
            document.getElementById('hint-txt').innerText = "Square the radius: " + r + " x " + r;
        } else if (lv === 2) {
            document.getElementById('task-title').innerText = "Find Area (In terms of Pi)";
            document.getElementById('d-line').style.display = "block";
            document.getElementById('circle-val').innerText = "d=" + (r * 2);
            goal = rSq;
            document.getElementById('hint-txt').innerText = "Half of " + (r*2) + " is " + r + ". Now square it!";
        } else {
            document.getElementById('task-title').innerText = "Find the Radius";
            document.getElementById('circle-val').innerText = "A=" + rSq + "π";
            document.getElementById('unit-label').innerText = "cm";
            goal = r;
            document.getElementById('hint-txt').innerText = "What number squared equals " + rSq + "? (Square root it)";
        }
        document.getElementById('ans-txt').innerText = "Answer: " + goal;
    }

    function checkAnswer() {
        let u = parseInt(document.getElementById('userIn').value);
        let f = document.getElementById('feedback');
        if (u === goal) { f.innerText = "✅ CORRECT!"; f.style.color = "green"; }
        else { f.innerText = "❌ TRY AGAIN"; f.style.color = "red"; }
    }

    function showHint() { let x = document.getElementById('hint-txt'); x.style.display = (x.style.display === "none") ? "block" : "none"; }
    function showAnswer() { let x = document.getElementById('ans-txt'); x.style.display = (x.style.display === "none") ? "block" : "none"; }

    updateClock();
    makeProblem(1);
</script>
</body>
</html>
